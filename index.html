<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Copy DOCX Text</title>

  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 120px);
      gap: 15px;
    }

    button {
      padding: 15px;
      font-size: 22px;
      cursor: pointer;
    }

    #status {
      margin-top: 25px;
      font-size: 18px;
      color: green;
    }
  </style>
</head>
<body>

<h2></h2>

<div class="grid">
  <button onclick="copyDocx('1-1.docx')">1-1</button>
  <button onclick="copyDocx('1-2.docx')">1-2</button>

  <button onclick="copyDocx('2-1.docx')">2-1</button>
  <button onclick="copyDocx('2-2.docx')">2-2</button>

  <button onclick="copyDocx('3-1.docx')">3-1</button>
  <button onclick="copyDocx('3-2.docx')">3-2</button>

  <button onclick="copyDocx('4-1.docx')">4-1</button>
  <button onclick="copyDocx('4-2.docx')">4-2</button>
</div>

<p id="status"></p>

<script>
async function copyDocx(filename) {
  const status = document.getElementById("status");

  try {
    const response = await fetch(filename);

    if (!response.ok) {
      throw new Error("File not found: " + filename);
    }

    const arrayBuffer = await response.arrayBuffer();

    const result = await mammoth.extractRawText({
      arrayBuffer: arrayBuffer
    });

    await navigator.clipboard.writeText(result.value);

    status.textContent = filename + " done.";
  } catch (error) {
    status.textContent = "Error: " + error.message;
  }
}
</script>

</body>
</html>
