<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>IB</title>

  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 120px);
      gap: 15px;
    }

    button {
      padding: 15px;
      font-size: 22px;
      cursor: pointer;
    }

    #status {
      margin-top: 25px;
      font-size: 18px;
      color: green;
    }

    #status.error {
      color: red;
    }
  </style>
</head>

<body>

<h2>IB</h2>

<div class="grid">
  <button onclick="copyFile('1-1.docx')">1-1(All)</button>
  <button onclick="copyFile('1-2.docx')">1-2</button>

  <button onclick="copyFile('2-1.docx')">2-1(All)</button>
  <button onclick="copyFile('2-2.docx')">2-2</button>

  <button onclick="copyFile('3-1.docx')">3-1(All)</button>
  <button onclick="copyFile('3-2.docx')">3-2</button>

  <button onclick="copyFile('4-1.txt')">4-1(All)</button>
  <button onclick="copyFile('4-2.txt')">4-2</button>
</div>

<p id="status"></p>

<script>
async function copyFile(filename) {
  const status = document.getElementById("status");

  status.classList.remove("error");
  status.textContent = "Opening " + filename + "...";

  try {
    // Add a timestamp to prevent the browser from using the old cached file
    const response = await fetch(filename + "?v=" + Date.now(), {
      cache: "no-store"
    });

    if (!response.ok) {
      throw new Error("File not found: " + filename);
    }

    let text = "";

    if (filename.toLowerCase().endsWith(".docx")) {
      const arrayBuffer = await response.arrayBuffer();

      const result = await mammoth.extractRawText({
        arrayBuffer: arrayBuffer
      });

      text = result.value;
    }

    else if (filename.toLowerCase().endsWith(".txt")) {
      text = await response.text();
    }

    else {
      throw new Error("Unsupported file type: " + filename);
    }

    await navigator.clipboard.writeText(text);

    status.textContent = filename + " copied to clipboard.";
  }

  catch (error) {
    status.classList.add("error");
    status.textContent = "Error: " + error.message;
  }
}
</script>

</body>
</html>
